    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; }
        .app-container { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .mobile-header { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; background: #ffffff; border-bottom: 1px solid #e5e7eb; position: sticky; top: 0; z-index: 100; }
        .header-menu-btn, .header-action-btn { background: none; border: none; cursor: pointer; padding: 8px; border-radius: 8px; color: #374151; }
        .header-menu-btn:hover, .header-action-btn:hover { background: #f3f4f6; }
        .header-menu-btn svg, .header-action-btn svg { width: 20px; height: 20px; display: block; }
        .header-logo { display: flex; align-items: center; gap: 8px; }
        .header-logo img { height: 28px; width: auto; }
        .header-logo-text { font-weight: 600; font-size: 14px; color: #111827; }
        .header-actions { display: flex; align-items: center; gap: 4px; }
        .sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 200; }
        .sidebar-overlay.visible { display: block; }
        .mobile-sidebar { position: fixed; top: 0; left: -280px; width: 280px; height: 100vh; background: #ffffff; border-right: 1px solid #e5e7eb; transition: left 0.25s ease; z-index: 300; display: flex; flex-direction: column; }
        .mobile-sidebar.open { left: 0; }
        .sidebar-header { padding: 20px 16px 12px; border-bottom: 1px solid #f3f4f6; }
        .sidebar-logo { display: flex; align-items: center; gap: 10px; }
        .sidebar-logo img { height: 32px; width: auto; }
        .sidebar-logo-text { font-weight: 700; font-size: 15px; color: #111827; }
        .sidebar-nav { flex: 1; overflow-y: auto; padding: 12px 8px; }
        .sidebar-section { margin-bottom: 8px; }
        .sidebar-section-title { font-size: 10px; font-weight: 600; color: #9ca3af; text-transform: uppercase; letter-spacing: 0.05em; padding: 4px 12px; margin-bottom: 4px; }
        .sidebar-item { display: flex; align-items: center; gap: 12px; padding: 10px 12px; border-radius: 8px; cursor: pointer; text-decoration: none; color: #374151; font-size: 14px; font-weight: 500; transition: background 0.15s; }
        .sidebar-item:hover { background: #f3f4f6; }
        .sidebar-item.active { background: #eff6ff; color: #2563eb; }
        .sidebar-item-icon { width: 20px; height: 20px; flex-shrink: 0; }
        .sidebar-item-icon svg { width: 20px; height: 20px; }
        .sidebar-user { padding: 16px; border-top: 1px solid #f3f4f6; display: flex; align-items: center; gap: 10px; }
        .sidebar-avatar { width: 36px; height: 36px; border-radius: 50%; background: #2563eb; color: #fff; display: flex; align-items: center; justify-content: center; font-size: 14px; font-weight: 600; flex-shrink: 0; }
        .sidebar-user-details { flex: 1; min-width: 0; }
        .sidebar-user-name { font-size: 13px; font-weight: 600; color: #111827; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .sidebar-user-role { font-size: 11px; color: #6b7280; }
        .sidebar-logout-btn { background: none; border: none; cursor: pointer; padding: 6px; border-radius: 6px; color: #6b7280; display: flex; align-items: center; }
        .sidebar-logout-btn:hover { background: #fee2e2; color: #dc2626; }
        .main-content { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
        #content-area { min-height: 100%; }
        .loading { display: flex; align-items: center; justify-content: center; height: 200px; color: #6b7280; font-size: 14px; }
        /* Mobile exercise view */
        .mobile-physio-ex-tabs { display: flex; border-bottom: 2px solid #e5e7eb; margin-bottom: 12px; }
        .mobile-physio-ex-tab { flex: 1; padding: 10px; background: none; border: none; cursor: pointer; font-size: 14px; font-weight: 500; color: #6b7280; border-bottom: 2px solid transparent; margin-bottom: -2px; }
        .mobile-physio-ex-tab.active { color: #0ea5e9; border-bottom-color: #0ea5e9; }
        .mobile-physio-ex-pane { display: none; }
        .mobile-physio-ex-pane.active { display: block; }
        .mobile-physio-protocol-name { font-size: 16px; font-weight: 600; color: #111827; margin-bottom: 12px; }
        .mobile-physio-ex-card { background: #fff; border-radius: 10px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); margin-bottom: 16px; overflow: hidden; }
        .mobile-physio-video { position: relative; width: 100%; padding-bottom: 56.25%; background: #000; }
        .mobile-physio-video iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
        .mobile-physio-no-video { height: 120px; display: flex; align-items: center; justify-content: center; background: #f3f4f6; color: #9ca3af; font-size: 13px; }
        .mobile-physio-ex-body { padding: 12px; }
        .mobile-physio-ex-name { font-weight: 600; font-size: 15px; color: #111827; margin-bottom: 8px; }
        .mobile-physio-ex-rx { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 6px; }
        .mobile-physio-rx-tag { background: #0ea5e9; color: #fff; font-size: 12px; font-weight: 600; padding: 3px 10px; border-radius: 12px; }
        .mobile-physio-ex-notes { font-size: 13px; color: #6b7280; background: #f9fafb; border-radius: 4px; padding: 6px 8px; }
        .mobile-physio-no-protocol, .mobile-physio-loading { padding: 32px 16px; text-align: center; color: #6b7280; font-size: 14px; }
