<script>
function initMobileDashboard() {
    loadPhysioDashboardStats();
    Layer8MNav.showHome();
}

async function loadPhysioDashboardStats() {
    const kpis = [
        { id: 'stat-clients',      endpoint: '/50/PhyClient',  query: 'select * from PhysioClient where status=1 limit 1 page 0' },
        { id: 'stat-appointments', endpoint: '/50/PhyAppt',    query: 'select * from Appointment where status=1 limit 1 page 0' },
        { id: 'stat-plans',        endpoint: '/50/PhyPlan',    query: 'select * from TreatmentPlan where status=2 limit 1 page 0' },
        { id: 'stat-exercises',    endpoint: '/50/PhyExercis', query: 'select * from PhysioExercise where isActive=true limit 1 page 0' }
    ];

    await Promise.all(kpis.map(async function(kpi) {
        try {
            const body = encodeURIComponent(JSON.stringify({ text: kpi.query }));
            const response = await Layer8MAuth.get(Layer8MConfig.resolveEndpoint(kpi.endpoint) + '?body=' + body);
            const el = document.getElementById(kpi.id);
            if (el) {
                el.textContent = (response && response.metadata && response.metadata.keyCount && response.metadata.keyCount.counts)
                    ? (response.metadata.keyCount.counts.Total || 0)
                    : '0';
            }
        } catch (e) {
            const el = document.getElementById(kpi.id);
            if (el) el.textContent = '0';
        }
    }));
}
</script>
