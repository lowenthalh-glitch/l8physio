<div class="section-container l8-section">
    <!-- Header with Parallax Effect -->
    <div class="l8-header-frame parallax-container">
        <!-- Background Illustration Layer -->
        <div class="l8-header-bg parallax-layer" data-speed="0.5">
            <svg class="l8-illustration" viewBox="0 0 1200 120" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <linearGradient id="physioGradient1" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" style="stop-color:#10b981;stop-opacity:0.4" />
                        <stop offset="100%" style="stop-color:#059669;stop-opacity:0.2" />
                    </linearGradient>
                </defs>

                <!-- Grid Background -->
                <g opacity="0.1">
                    <line x1="0" y1="30" x2="1200" y2="30" stroke="#10b981" stroke-width="0.5"/>
                    <line x1="0" y1="60" x2="1200" y2="60" stroke="#10b981" stroke-width="0.5"/>
                    <line x1="0" y1="90" x2="1200" y2="90" stroke="#10b981" stroke-width="0.5"/>
                    <line x1="200" y1="0" x2="200" y2="120" stroke="#10b981" stroke-width="0.5"/>
                    <line x1="400" y1="0" x2="400" y2="120" stroke="#10b981" stroke-width="0.5"/>
                    <line x1="600" y1="0" x2="600" y2="120" stroke="#10b981" stroke-width="0.5"/>
                    <line x1="800" y1="0" x2="800" y2="120" stroke="#10b981" stroke-width="0.5"/>
                    <line x1="1000" y1="0" x2="1000" y2="120" stroke="#10b981" stroke-width="0.5"/>
                </g>

                <!-- Physiotherapy Icons -->
                <g class="people-animation">
                    <!-- Heart/Pulse Icon -->
                    <path d="M 185,55 C 185,45 195,35 200,45 C 205,35 215,45 215,55 C 215,65 200,78 200,78 C 200,78 185,65 185,55 Z" fill="url(#physioGradient1)" opacity="0.5"/>
                    <polyline points="180,60 190,60 195,50 200,70 205,55 210,60 220,60" fill="none" stroke="#10b981" stroke-width="1.5" opacity="0.4"/>

                    <!-- Person Stretching Icon -->
                    <circle cx="420" cy="38" r="8" fill="url(#physioGradient1)" opacity="0.5"/>
                    <line x1="420" y1="46" x2="420" y2="68" stroke="url(#physioGradient1)" stroke-width="2.5" opacity="0.5"/>
                    <line x1="408" y1="55" x2="432" y2="50" stroke="url(#physioGradient1)" stroke-width="2" opacity="0.5"/>
                    <line x1="420" y1="68" x2="410" y2="82" stroke="url(#physioGradient1)" stroke-width="2" opacity="0.5"/>
                    <line x1="420" y1="68" x2="430" y2="82" stroke="url(#physioGradient1)" stroke-width="2" opacity="0.5"/>

                    <!-- Dumbbell Icon -->
                    <rect x="585" y="53" width="10" height="18" rx="2" fill="url(#physioGradient1)" opacity="0.5"/>
                    <rect x="625" y="53" width="10" height="18" rx="2" fill="url(#physioGradient1)" opacity="0.5"/>
                    <line x1="595" y1="62" x2="625" y2="62" stroke="url(#physioGradient1)" stroke-width="3" opacity="0.4"/>

                    <!-- Clipboard Icon -->
                    <rect x="790" y="40" width="24" height="32" rx="3" fill="url(#physioGradient1)" opacity="0.5"/>
                    <rect x="796" y="36" width="12" height="8" rx="2" fill="url(#physioGradient1)" opacity="0.6"/>
                    <line x1="796" y1="52" x2="808" y2="52" stroke="#fff" stroke-width="1.5" opacity="0.5"/>
                    <line x1="796" y1="58" x2="808" y2="58" stroke="#fff" stroke-width="1.5" opacity="0.5"/>
                    <line x1="796" y1="64" x2="804" y2="64" stroke="#fff" stroke-width="1.5" opacity="0.5"/>

                    <!-- Calendar/Clock Icon -->
                    <rect x="985" y="40" width="28" height="28" rx="4" fill="url(#physioGradient1)" opacity="0.5"/>
                    <line x1="985" y1="48" x2="1013" y2="48" stroke="#fff" stroke-width="1" opacity="0.4"/>
                    <circle cx="999" cy="58" r="7" fill="none" stroke="#fff" stroke-width="1" opacity="0.4"/>
                    <line x1="999" y1="54" x2="999" y2="58" stroke="#fff" stroke-width="1" opacity="0.5"/>
                    <line x1="999" y1="58" x2="1003" y2="60" stroke="#fff" stroke-width="1" opacity="0.5"/>
                </g>
            </svg>
        </div>

        <!-- Header Content Layer -->
        <div class="l8-header-content parallax-layer" data-speed="1">
            <div class="l8-header-title">
                <div class="l8-icon">&#9877;</div>
                <div>
                    <h1 class="l8-title">Physiotherapy</h1>
                    <p class="l8-subtitle">Therapists, Clients & Treatment Management</p>
                </div>
            </div>
        </div>
    </div>

    <div class="l8-module-tabs">
        <button class="l8-module-tab active" data-module="management">
            <span class="tab-icon">&#9877;</span>
            <span class="tab-label">Management</span>
        </button>
    </div>

    <div class="l8-module-content active" data-module="management">
        <div class="l8-subnav">
            <a class="l8-subnav-item active" data-service="therapists">Therapists</a>
            <a class="l8-subnav-item" data-service="clients">Clients</a>
            <a class="l8-subnav-item" data-service="exercises">Exercises</a>
            <a class="l8-subnav-item" data-service="protocols">Protocol Templates</a>
            <a class="l8-subnav-item" data-service="plans">Treatment Plans</a>
            <a class="l8-subnav-item" data-service="appointments">Appointments</a>
            <a class="l8-subnav-item" data-service="progress">Progress Logs</a>
            <a class="l8-subnav-item" data-service="reports">Session Reports</a>
            <a class="l8-subnav-item" data-service="feedback">Home Feedback</a>
            <a class="l8-subnav-item" data-service="boostapp">Boostapp Calendar</a>
            <a class="l8-subnav-item" data-service="builder">&#128203; Workout Builder</a>
        </div>

        <div class="l8-service-view active" data-service="therapists">
            <div class="l8-table-container" id="management-therapists-table-container"></div>
        </div>
        <div class="l8-service-view" data-service="clients">
            <div class="l8-table-container" id="management-clients-table-container"></div>
        </div>
        <div class="l8-service-view" data-service="exercises">
            <div class="l8-table-container" id="management-exercises-table-container"></div>
        </div>
        <div class="l8-service-view" data-service="protocols">
            <div class="l8-table-container" id="management-protocols-table-container"></div>
        </div>
        <div class="l8-service-view" data-service="plans">
            <div class="l8-table-container" id="management-plans-table-container"></div>
        </div>
        <div class="l8-service-view" data-service="appointments">
            <div class="l8-table-container" id="management-appointments-table-container"></div>
        </div>
        <div class="l8-service-view" data-service="progress">
            <div class="l8-table-container" id="management-progress-table-container"></div>
        </div>
        <div class="l8-service-view" data-service="reports">
            <div class="l8-table-container" id="management-reports-table-container"></div>
        </div>
        <div class="l8-service-view" data-service="feedback">
            <div class="l8-table-container" id="management-feedback-table-container"></div>
        </div>
        <div class="l8-service-view" data-service="boostapp">
            <div class="l8-table-container" id="management-boostapp-table-container"></div>
        </div>
        <div class="l8-service-view" data-service="builder">
            <div id="physio-workout-builder"></div>
        </div>
    </div>
</div>
